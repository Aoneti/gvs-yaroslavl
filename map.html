<div class="topbar">

<div class="main">
  <div class="panel">

      <div class="panel-label">Поиск</div>
      <div class="search-wrap">

               aria-label="Поиск по адресу на карте">

          <span class="filter-text">Гидроиспытание 2</span>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
// ── Тема (читаем из localStorage, кнопки нет — управление из index) ───
(function() {
  if (localStorage.getItem('theme') === 'light') {
    document.documentElement.classList.add('light');
  }
})();

// ── Нормализация ключа для сопоставления geo.json ↔ data.json ─
// Убирает точки, запятые, лишние пробелы.
// "ул. Панина д. 25" и "ул. Панина, д.25" → одно и то же
function normKey(s) {
  return s.toLowerCase().replace(/[.,]/g, ' ').replace(/\s+/g, ' ').trim();
}

// ── Нормализация поискового запроса ─────────────────────────
// Убирает служебные слова (ул, д, пр-кт…) и пунктуацию,
// возвращает массив токенов.
// "Панина 25" → ["панина", "25"]
// "ул. Панина, д.25" → ["панина", "25"]
function normalizeQuery(s) {
  return s.toLowerCase()
    .replace(/[.,]/g, ' ')       // точки и запятые → пробел
    .replace(/\bд\b/g, ' ')      // "д" как отдельное слово → пробел
    .replace(/\bул\b/g, ' ')     // "ул" → пробел
    .replace(/\bпр-кт\b/g, ' ') // "пр-кт" → пробел
    .replace(/\bпр-д\b/g, ' ')  // "пр-д" → пробел
    .replace(/\bпер\b/g, ' ')   // "пер" → пробел
    .replace(/\bпр\b/g, ' ')    // "пр" → пробел
    .replace(/\s+/g, ' ')
    .trim()
    .split(' ')
    .filter(Boolean);
}

// ── Склонение «адрес» ────────────────────────────────────────
function pluralAddr(n) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod100 >= 11 && mod100 <= 19) return n + ' адресов';
  if (mod10 === 1)                   return n + ' адрес';
  if (mod10 >= 2 && mod10 <= 4)      return n + ' адреса';
  return n + ' адресов';
}

// ── Карта ─────────────────────────────────────────────────────
// attributionControl:false — в Leaflet 1.9.x в стандартный prefix
// жёстко вшит флаг 🇺🇦, убрать его иначе невозможно.
const map = L.map('map', {
  center: [57.6261, 39.8845],
  zoom: 12,
  zoomControl: false,
  attributionControl: true,
});
L.control.zoom({ position: 'bottomleft' }).addTo(map);
map.attributionControl.setPrefix('<a href="https://leafletjs.com">Leaflet</a>');

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright" style="color:#7d8590">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);

// ── Кластерный слой ──────────────────────────────────────────
const clusterGroup = L.markerClusterGroup({
  maxClusterRadius: 50,
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
  zoomToBoundsOnClick: true,
  iconCreateFunction: function(cluster) {
    const color = getClusterColor(cluster.getAllChildMarkers());
    const count = cluster.getChildCount();
    return L.divIcon({
      html: '<div style="'
        + 'background:' + color + ';'
        + 'opacity:.82;'
        + 'width:34px;height:34px;'
        + 'border-radius:50%;'
        + 'border:2.5px solid #0d1117;'
        + 'box-shadow:0 2px 8px rgba(0,0,0,.55);'
        + 'line-height:30px;'
        + 'text-align:center;'
        + 'color:#fff;'
        + 'font-family:\'Unbounded\',sans-serif;'
        + 'font-size:11px;'
        + 'font-weight:700;'
        + '">' + count + '</div>',
      className: '',
      iconSize: [40, 40],
      iconAnchor: [20, 20],
    });
  },
});
map.addLayer(clusterGroup);

let allPoints = [], activeAddr = null;

// ── Загрузка данных ──────────────────────────────────────────
async function loadData() {
  const [dataRes, geoRes] = await Promise.all([
    fetch('data.json'),
    fetch('geo.json'),
  ]);
  const data  = await dataRes.json();
  const geoDb = await geoRes.json();

  // Нормализованный индекс geo.json
  const geoIdx = {};
  for (const [k, v] of Object.entries(geoDb)) {
    if (v) geoIdx[normKey(k)] = v;
  }

  // Группируем data.json по адресу
  const byAddr = {};
  for (const item of data) {
    if (!byAddr[item.address]) byAddr[item.address] = [];
    byAddr[item.address].push(item);
  }

  // Совмещаем по нормализованному ключу
  let matched = 0, missed = 0;
  for (const [addr, records] of Object.entries(byAddr)) {
    const geo = geoIdx[normKey(addr)];
    if (!geo) { missed++; continue; }
    matched++;
    allPoints.push({ address: addr, lat: geo.lat, lng: geo.lng, records,
                     _norm: normalizeQuery(addr).join(' ') });
  }
  console.log('geo.json совпало:', matched, '/ не найдено:', missed);

  renderAll();
}

// ── Экранирование HTML ───────────────────────────────────────
function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Парсинг дат для умной раскраски маркеров ─────────────────
function parseOneDate(s) {
  const m = String(s).match(/(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if (!m) return null;
  return new Date(+m[3], +m[2] - 1, +m[1]);
}

// Форматы: "27.05.2025", "25.07.2025-04.08.2025" (новый),
//           "25.07-04.08.2025", "23-24.07.2025" (обратная совместимость)
function parsePeriod(rangeStr, onStr) {
  if (!rangeStr) return null;
  const clean = String(rangeStr).replace(/\.{2,}/g, '.').trim();
  let start = null, end2 = null;

  // Новый нормализованный: "dd.mm.yyyy-dd.mm.yyyy"
  let m = clean.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})[-–](\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if (m) {
    start = new Date(+m[3], +m[2] - 1, +m[1]);
    end2  = new Date(+m[6], +m[5] - 1, +m[4]);
  }
  // Старый: "dd.mm-dd.mm.yyyy"
  if (!start) {
    m = clean.match(/^(\d{1,2})\.(\d{1,2})-\d{1,2}\.\d{1,2}\.(\d{4})/);
    if (m) start = new Date(+m[3], +m[2] - 1, +m[1]);
  }
  // Старый: "dd-dd.mm.yyyy"
  if (!start) {
    m = clean.match(/^(\d{1,2})-\d{1,2}\.(\d{1,2})\.(\d{4})/);
    if (m) start = new Date(+m[3], +m[2] - 1, +m[1]);
  }
  if (!start) start = parseOneDate(clean);
  if (!start) return null;
  const endFromOn = onStr ? parseOneDate(onStr) : null;
  return { start, end: endFromOn || end2 || start };
}

// ── Иконки и попапы ─────────────────────────────────────────
// Возвращает цвет маркера с учётом текущей даты:
//   красный/жёлтый/синий — если отключение идёт сейчас
//   зелёный              — если все периоды уже завершены (вода есть)
//   красный/жёлтый/синий — если отключение в будущем (по типу)
//   серый                — нет данных
function getTypeColor(records) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  // Проверяем, есть ли активное отключение прямо сейчас
  for (const r of records) {
    const checks = [
      { period: parsePeriod(r.repair,  r.repair_on),  color: '#e85d2f' },
      { period: parsePeriod(r.hydro1,  r.hydro1_on),  color: '#d29922' },
      { period: parsePeriod(r.hydro2,  r.hydro2_on),  color: '#58a6ff' },
    ];
    for (const c of checks) {
      if (c.period && today >= c.period.start && today <= c.period.end) return c.color;
    }
  }

  // Все периоды уже завершены → вода подана, зелёный
  const allPeriods = records.flatMap(r => [
    parsePeriod(r.repair,  r.repair_on),
    parsePeriod(r.hydro1,  r.hydro1_on),
    parsePeriod(r.hydro2,  r.hydro2_on),
  ]).filter(Boolean);

  if (allPeriods.length > 0 && allPeriods.every(p => p.end < today)) return '#3fb950';

  // Будущие отключения — по приоритету типа
  if (records.some(r => r.repair))  return '#e85d2f';
  if (records.some(r => r.hydro2))  return '#58a6ff';
  if (records.some(r => r.hydro1))  return '#d29922';
  return '#7d8590';
}

function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: '<div class="mc-dot" style="background:' + color + '"></div>',
    iconSize: [18, 18],
    iconAnchor: [9, 9],
  });
}

// Выбирает цвет кластера = наиболее приоритетный цвет среди дочерних маркеров
const COLOR_PRIORITY = { '#e85d2f': 0, '#d29922': 1, '#58a6ff': 2, '#3fb950': 3, '#7d8590': 4 };
function getClusterColor(children) {
  let best = '#7d8590', bestRank = 99;
  for (const m of children) {
    const c = m._gvsColor || '#7d8590';
    const rank = COLOR_PRIORITY[c] !== undefined ? COLOR_PRIORITY[c] : 99;
    if (rank < bestRank) { best = c; bestRank = rank; }
  }
  return best;
}

function makePopup(pt) {
  let rows = '';
  for (const r of pt.records) {
    if (r.repair) rows += '<div class="popup-row"><div class="popup-badge repair">Ремонт</div><div class="popup-dates">' + escapeHtml(r.repair) + '<br><span class="popup-on">▲ Подключение: ' + escapeHtml(r.repair_on || '—') + '</span></div></div>';
    if (r.hydro1) rows += '<div class="popup-row"><div class="popup-badge hydro1">Гидро 1</div><div class="popup-dates">' + escapeHtml(r.hydro1) + '<br><span class="popup-on">▲ Подключение: ' + escapeHtml(r.hydro1_on || '—') + '</span></div></div>';
    if (r.hydro2) rows += '<div class="popup-row"><div class="popup-badge hydro2">Гидро 2</div><div class="popup-dates">' + escapeHtml(r.hydro2) + '<br><span class="popup-on">▲ Подключение: ' + escapeHtml(r.hydro2_on || '—') + '</span></div></div>';
  }
  if (!rows) rows = '<div class="popup-dates" style="color:var(--muted);font-style:italic">Нет данных</div>';
  return '<div class="popup-inner"><div class="popup-addr">' + escapeHtml(pt.address) + '</div>'
    + rows + '</div>';
}

// ── Рендер ───────────────────────────────────────────────────
function renderAll() {
  const query = document.getElementById('panelSearch').value.toLowerCase().trim();
  const fRep  = document.getElementById('fRepair').checked;
  const fH1   = document.getElementById('fHydro1').checked;
  const fH2   = document.getElementById('fHydro2').checked;

  const tokens = normalizeQuery(query);

  clusterGroup.clearLayers();
  const listEl = document.getElementById('addrList');
  listEl.innerHTML = '';
  let shown = 0;

  for (const pt of allPoints) {
    // Гибкий поиск: все токены запроса должны присутствовать в адресе
    if (tokens.length > 0) {
      if (!tokens.every(function(t) { return pt._norm.includes(t); })) continue;
    }
    const hasRep = pt.records.some(r => r.repair);
    const hasH1  = pt.records.some(r => r.hydro1);
    const hasH2  = pt.records.some(r => r.hydro2);
    if (!((fRep && hasRep) || (fH1 && hasH1) || (fH2 && hasH2))) continue;

    shown++;

    const color = getTypeColor(pt.records);
    const marker = L.marker([pt.lat, pt.lng], { icon: makeIcon(color) });
    marker._gvsColor = color;
    marker.bindPopup(makePopup(pt), { maxWidth: 320 });
    marker.on('click', () => selectAddr(pt.address));
    clusterGroup.addLayer(marker);
    pt._marker = marker;

    const item = document.createElement('div');
    item.className = 'addr-item' + (pt.address === activeAddr ? ' active' : '');
    item.dataset.addr = pt.address;
    item.innerHTML = '<div class="addr-street">' + pt.address + '</div><div class="addr-dots">'
      + (hasRep ? '<div class="dot repair"></div>' : '')
      + (hasH1  ? '<div class="dot hydro1"></div>' : '')
      + (hasH2  ? '<div class="dot hydro2"></div>' : '')
      + '</div>';
    item.onclick = () => {
      selectAddr(pt.address);
      map.setView([pt.lat, pt.lng], 16, { animate: true });
      pt._marker && pt._marker.openPopup();
    };
    listEl.appendChild(item);
  }

  if (shown === 0) {
    listEl.innerHTML = '<div class="empty-list"><span class="big">🔍</span>Ничего не найдено. Попробуйте другое написание или воспользуйтесь основным поиском</div>';
  }
  document.getElementById('counterChip').textContent = pluralAddr(shown);
}

function selectAddr(address) {
  activeAddr = address;
  document.querySelectorAll('.addr-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.addr === address);
    if (el.dataset.addr === address) el.scrollIntoView({ block: 'nearest' });
  });
}

// ── События ──────────────────────────────────────────────────
let _mapSearchDebounce;
document.getElementById('panelSearch').addEventListener('input', function() {
  document.getElementById('searchClear').classList.toggle('vis', this.value.length > 0);
  clearTimeout(_mapSearchDebounce);
  _mapSearchDebounce = setTimeout(renderAll, 250);
});
document.getElementById('searchClear').addEventListener('click', function() {
  document.getElementById('panelSearch').value = '';
  this.classList.remove('vis');
  renderAll();
});
['fRepair', 'fHydro1', 'fHydro2'].forEach(function(id) {
  document.getElementById(id).addEventListener('change', renderAll);
});

// ── Bottom sheet drag handle (только mobile) ─────────────────
// Единственный обработчик — объединяет лучшее из двух предыдущих версий:
//   • динамическое добавление/удаление слушателей (не висят постоянно)
//   • 3 точки снэппинга: 30% / 60% / 85% высоты экрана
//   • сброс высоты при resize
(function() {
  const handle = document.getElementById('sheetHandle');
  const panel  = handle.parentElement;
  let dragging = false, startY = 0, startH = 0;

  function isMobile() { return window.innerWidth <= 640; }

  function snapHeight(h) {
    const vh = window.innerHeight;
    const snaps = [0.30, 0.60, 0.85].map(r => Math.round(vh * r));
    return snaps.reduce((a, b) => Math.abs(b - h) < Math.abs(a - h) ? b : a);
  }

  function onMove(e) {
    if (!dragging) return;
    if (e.cancelable) e.preventDefault();
    const y    = (e.touches ? e.touches[0].clientY : e.clientY);
    const newH = startH - (y - startY);
    const vh   = window.innerHeight;
    panel.style.height = Math.min(Math.max(newH, 80), vh * 0.88) + 'px';
    panel.style.transition = 'none';
  }

  function onEnd() {
    if (!dragging) return;
    dragging = false;
    panel.style.transition = 'height .3s ease';
    panel.style.height = snapHeight(panel.offsetHeight) + 'px';
    document.removeEventListener('mousemove',  onMove);
    document.removeEventListener('mouseup',    onEnd);
    document.removeEventListener('touchmove',  onMove);
    document.removeEventListener('touchend',   onEnd);
  }

  function onStart(e) {
    if (!isMobile()) return;
    dragging = true;
    startY = (e.touches ? e.touches[0].clientY : e.clientY);
    startH = panel.offsetHeight;
    document.addEventListener('mousemove',  onMove);
    document.addEventListener('mouseup',    onEnd);
    document.addEventListener('touchmove',  onMove, { passive: false });
    document.addEventListener('touchend',   onEnd);
  }

  function initHeight() {
    if (isMobile()) panel.style.height = Math.round(window.innerHeight * 0.30) + 'px';
    else panel.style.height = '';
  }

  handle.addEventListener('mousedown',  onStart);
  handle.addEventListener('touchstart', onStart, { passive: true });
  window.addEventListener('resize', initHeight);
  initHeight();
})();

loadData().catch(function(err) {
  document.getElementById('addrList').innerHTML =
    '<div class="empty-list"><span class="big">⚠️</span>Ошибка загрузки данных.</div>';
  console.error(err);
});
</script>
