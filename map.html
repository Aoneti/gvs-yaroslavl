    .search-wrap input { font-size:15px; padding:12px 36px 12px 12px; }
    .search-clear { font-size:16px; right:10px; }

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH"
        crossorigin="anonymous"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"
        integrity="sha384-eXVCORTRlv4FUUgS/xmOyr66XBVraen8ATNLMESp92FKXLAMiKkerixTiBvXriZr"
        crossorigin="anonymous"></script>
<script>
// ── Тема ─────────────────────────────────────────────────────────────────

// ─── Константы ───────────────────────────────────────────────────────────
const MAP_CENTER       = [57.6261, 39.8845];
const MAP_ZOOM_DEFAULT = 12;
const MAP_ZOOM_FOCUS   = 16;
const CLUSTER_RADIUS   = 50;
const MAX_LIST_ITEMS   = 200;

// ─── normKey ─────────────────────────────────────────────────────────────
// Сортирует токены для порядконезависимого матчинга адресов из data.json и geo.json 
function normKey(s) {
  return s.toLowerCase()
    .replace(/[.,]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim()
    .split(' ')
    .filter(Boolean)
    .sort()
    .join(' ');
}

// ─── Склонение «адрес» ───────────────────────────────────────────────────
function pluralAddr(n) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod100 >= 11 && mod100 <= 19) return n + ' адресов';
  if (mod10 === 1)                   return n + ' адрес';
  if (mod10 >= 2 && mod10 <= 4)      return n + ' адреса';
  return n + ' адресов';
}

// ─── Карта ───────────────────────────────────────────────────────────────
const map = L.map('map', {
  center: MAP_CENTER,
  zoom: MAP_ZOOM_DEFAULT,
  zoomControl: false,
  attributionControl: true,
});
L.control.zoom({ position: 'bottomleft' }).addTo(map);
map.attributionControl.setPrefix('<a href="https://leafletjs.com">Leaflet</a>');

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright" style="color:#7d8590">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);

// ─── Кластерный слой ─────────────────────────────────────────────────────
const clusterGroup = L.markerClusterGroup({
  maxClusterRadius: CLUSTER_RADIUS,
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
  zoomToBoundsOnClick: true,
  iconCreateFunction: function(cluster) {
    const color = getClusterColor(cluster.getAllChildMarkers());
    const count = cluster.getChildCount();
    return L.divIcon({
      html: `<div style="background:${color};opacity:.82;width:34px;height:34px;border-radius:50%;border:2.5px solid #0d1117;box-shadow:0 2px 8px rgba(0,0,0,.55);line-height:30px;text-align:center;color:#fff;font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;">${count}</div>`,
      className: '',
      iconSize: [40, 40],
      iconAnchor: [20, 20],
    });
  },
});
map.addLayer(clusterGroup);

let allPoints = [];
let activeAddr = null;

const escapeHtml = GVS.escapeHtml;

// ─── Цвет маркера ────────────────────────────────────────────────────────
function makeIcon(color, approximate) {
  const cls = approximate ? 'mc-dot approximate' : 'mc-dot';
  return L.divIcon({
    className: '',
    html: `<div class="${cls}" style="background:${color}"></div>`,
    iconSize: [18, 18],
    iconAnchor: [9, 9],
  });
}

const COLOR_PRIORITY = { '#e85d2f': 0, '#d29922': 1, '#58a6ff': 2, '#3fb950': 3, '#7d8590': 4 };
function getClusterColor(children) {
  let best = '#7d8590', bestRank = 99;
  for (const m of children) {
    const c = m._gvsColor || '#7d8590';
    const rank = COLOR_PRIORITY[c] !== undefined ? COLOR_PRIORITY[c] : 99;
    if (rank < bestRank) { best = c; bestRank = rank; }
  }
  return best;
}

// ─── Попап ───────────────────────────────────────────────────────────────
function makePopup(pt) {
  let rows = '';
  for (const r of pt.records) {
    const fields = [
      { key: 'repair', label: 'Ремонт',   on: r.repair_on },
      { key: 'hydro1', label: 'Гидро 1',  on: r.hydro1_on },
      { key: 'hydro2', label: 'Гидро 2',  on: r.hydro2_on },
    ];
    for (const f of fields) {
      const val = r[f.key];
      if (!val) continue;
      const content = GVS.isDateValue(val)
        ? `<div class="popup-dates">${escapeHtml(val)}${f.on ? `<br><span class="popup-on">▲ Подключение: ${escapeHtml(f.on)}</span>` : ''}</div>`
        : `<div class="popup-note">${escapeHtml(val)}</div>`;
      rows += `<div class="popup-row"><div class="popup-badge ${f.key}">${f.label}</div>${content}</div>`;
    }
  }
  if (!rows) rows = '<div class="popup-dates" style="color:var(--muted);font-style:italic">Нет данных</div>';
  const approxBadge = pt.approximate
    ? `<div style="margin-top:8px;font-size:11px;color:var(--muted);font-style:italic">` +
      `📍 Координаты приблизительны</div>`
    : '';
  return `<div class="popup-inner"><div class="popup-addr">${escapeHtml(pt.address)}</div>${rows}${approxBadge}</div>`;
}

// ─── Загрузка данных ─────────────────────────────────────────────────────
async function loadData() {
  const [dataRes, geoRes] = await Promise.all([
    fetch('data.json', { cache: 'no-cache' }),
    fetch('geo.json',  { cache: 'no-cache' }),
  ]);

  if (!dataRes.ok) throw new Error(`data.json: HTTP ${dataRes.status}`);
  if (!geoRes.ok)  throw new Error(`geo.json: HTTP ${geoRes.status}`);

  const geoDb = await geoRes.json();
  if (!geoDb || typeof geoDb !== 'object' || !Object.keys(geoDb).length) {
    throw new Error('geo.json пустой или повреждён');
  }

  const data = await dataRes.json();

  // normKey сортирует токены → порядконезависимый матчинг
  const geoIdx = {};
  for (const [k, v] of Object.entries(geoDb)) {
    if (v && typeof v.lat === 'number' && typeof v.lng === 'number') {
      geoIdx[normKey(k)] = v;
    }
  }

  // Группируем по адресу
  const byAddr = {};
  for (const item of data) {
    if (!byAddr[item.address]) byAddr[item.address] = [];
    byAddr[item.address].push(item);
  }

  let matched = 0, missed = 0;
  for (const [addr, records] of Object.entries(byAddr)) {
    const geo = geoIdx[normKey(addr)];
    if (!geo) { missed++; continue; }
    matched++;
    const color      = GVS.getMapColor(records);
    const approximate = geo.approximate === true;
    const pt     = {
      address: addr,
      lat: geo.lat, lng: geo.lng,
      records,
      approximate,
      _norm: GVS.normalizeQuery(addr).join(' '),
    };
    const marker = L.marker([pt.lat, pt.lng], { icon: makeIcon(color, approximate) });
    marker._gvsColor = color;
    marker.bindPopup(makePopup(pt), { maxWidth: 320 });
    marker.on('click', () => selectAddr(pt.address));
    pt._marker = marker;
    allPoints.push(pt);
  }

  console.log(`[map] geo совпало: ${matched}, без координат: ${missed}`);

  const chip = document.getElementById('counterChip');
  if (missed > 0) chip.title = `${missed} адресов не показаны (нет координат в geo.json)`;

  renderAll();
}

// ─── Рендер: batch addLayers + ограничение списка ───────────────────────
function renderAll() {
  const tokens = GVS.normalizeQuery(document.getElementById('panelSearch').value);
  const fRep   = document.getElementById('fRepair').checked;
  const fH1    = document.getElementById('fHydro1').checked;
  const fH2    = document.getElementById('fHydro2').checked;

  const visible  = [];
  const fragment = document.createDocumentFragment();
  let   listCount = 0;

  for (const pt of allPoints) {
    const matchSearch = !tokens.length || tokens.every(t => pt._norm.includes(t));
    const hasRep = pt.records.some(r => GVS.isDateValue(r.repair));
    const hasH1  = pt.records.some(r => GVS.isDateValue(r.hydro1));
    const hasH2  = pt.records.some(r => GVS.isDateValue(r.hydro2));
    const matchFilter = (fRep && hasRep) || (fH1 && hasH1) || (fH2 && hasH2);

    if (!matchSearch || !matchFilter) continue;

    visible.push(pt._marker);

    // Добавляем в DOM-список только первые MAX_LIST_ITEMS элементов
    if (listCount < MAX_LIST_ITEMS) {
      const item = document.createElement('div');
      item.className = 'addr-item' + (pt.address === activeAddr ? ' active' : '');
      item.dataset.addr = pt.address;
      item.innerHTML = `<div class="addr-street">${escapeHtml(pt.address)}${pt.approximate ? ' <span style="color:var(--muted);font-size:10px">~</span>' : ''}</div>
        <div class="addr-dots">
          ${hasRep ? '<div class="dot repair"></div>' : ''}
          ${hasH1  ? '<div class="dot hydro1"></div>' : ''}
          ${hasH2  ? '<div class="dot hydro2"></div>' : ''}
        </div>`;
      item.addEventListener('click', () => {
        selectAddr(pt.address);
        map.setView([pt.lat, pt.lng], MAP_ZOOM_FOCUS, { animate: true });
        pt._marker && pt._marker.openPopup();
      });
      fragment.appendChild(item);
      listCount++;
    }
  }

  // Плашка с количеством скрытых адресов (если есть)
  if (visible.length > MAX_LIST_ITEMS) {
    const overflow = document.createElement('div');
    overflow.className = 'addr-overflow';
    overflow.textContent = `↑ и ещё ${visible.length - MAX_LIST_ITEMS} — уточните поиск`;
    fragment.appendChild(overflow);
  }

  // Batch-обновление кластера
  clusterGroup.clearLayers();
  if (visible.length) clusterGroup.addLayers(visible);

  const listEl = document.getElementById('addrList');
  listEl.innerHTML = '';
  if (visible.length) {
    listEl.appendChild(fragment);
  } else {
    listEl.innerHTML = '<div class="empty-list"><span class="big">🔍</span>Ничего не найдено. Попробуйте другое написание или воспользуйтесь основным поиском</div>';
  }

  document.getElementById('counterChip').textContent = pluralAddr(visible.length);
}

function selectAddr(address) {
  activeAddr = address;
  document.querySelectorAll('.addr-item').forEach(el => {
    el.classList.toggle('active', el.dataset.addr === address);
    if (el.dataset.addr === address) el.scrollIntoView({ block: 'nearest' });
  });
}

// ─── События ─────────────────────────────────────────────────────────────
let _mapSearchDebounce;
document.getElementById('panelSearch').addEventListener('input', function() {
  document.getElementById('searchClear').classList.toggle('vis', this.value.length > 0);
  clearTimeout(_mapSearchDebounce);
  _mapSearchDebounce = setTimeout(renderAll, 250);
});
document.getElementById('searchClear').addEventListener('click', function() {
  document.getElementById('panelSearch').value = '';
  this.classList.remove('vis');
  renderAll();
});
['fRepair', 'fHydro1', 'fHydro2'].forEach(id => {
  document.getElementById(id).addEventListener('change', renderAll);
});

// ─── Bottom sheet drag handle (только mobile) ────────────────────────────
(function() {
  const handle = document.getElementById('sheetHandle');
  const panel  = handle.parentElement;
  const SNAP_RATIOS = [0.30, 0.60, 0.85];
  let dragging = false, startY = 0, startH = 0;

  function isMobile() { return window.innerWidth <= 640; }

  function snapHeight(h) {
    const vh    = window.innerHeight;
    const snaps = SNAP_RATIOS.map(r => Math.round(vh * r));
    return snaps.reduce((a, b) => Math.abs(b - h) < Math.abs(a - h) ? b : a);
  }

  function onMove(e) {
    if (!dragging) return;
    if (e.cancelable) e.preventDefault();
    const y    = e.touches ? e.touches[0].clientY : e.clientY;
    const newH = startH - (y - startY);
    panel.style.height = Math.min(Math.max(newH, 80), window.innerHeight * 0.88) + 'px';
    panel.style.transition = 'none';
  }

  function onEnd() {
    if (!dragging) return;
    dragging = false;
    panel.style.transition = 'height .3s ease';
    panel.style.height = snapHeight(panel.offsetHeight) + 'px';
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup',   onEnd);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend',  onEnd);
  }

  function onStart(e) {
    if (!isMobile()) return;
    dragging = true;
    startY = e.touches ? e.touches[0].clientY : e.clientY;
    startH = panel.offsetHeight;
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onEnd);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend',  onEnd);
  }

  function initHeight() {
    panel.style.height = isMobile() ? Math.round(window.innerHeight * SNAP_RATIOS[0]) + 'px' : '';
  }

  handle.addEventListener('mousedown',  onStart);
  handle.addEventListener('touchstart', onStart, { passive: true });
  window.addEventListener('resize', initHeight);
  initHeight();
})();

// ─── Запуск ──────────────────────────────────────────────────────────────
loadData().catch(err => {
  document.getElementById('addrList').innerHTML =
    `<div class="empty-list"><span class="big">⚠️</span>Ошибка загрузки данных.<br><small style="color:var(--muted)">${GVS.escapeHtml(err.message)}</small></div>`;
  document.getElementById('counterChip').textContent = 'Ошибка';
  console.error('[map] loadData failed:', err);
});
</script>
