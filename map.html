<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карта отключений ГВС — Ярославль 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<!-- MarkerCluster CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<style>
  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --surface2: #1c2333;
    --border:   #30363d;
    --accent:   #e85d2f;
    --accent2:  #ff8c5a;
    --text:     #e6edf3;
    --muted:    #7d8590;
    --success:  #3fb950;
    --warn:     #d29922;
    --blue:     #58a6ff;
    --panel:    280px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Golos Text', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Топбар ─────────────────────────────────────────────── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 1000;
  }
  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Golos Text', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    transition: border-color .2s, color .2s;
    white-space: nowrap;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .topbar-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .topbar-title span { color: var(--accent); }
  .topbar-sep { flex: 1; }
  .counter-chip {
    background: rgba(232,93,47,.15);
    border: 1px solid rgba(232,93,47,.3);
    color: var(--accent2);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* ── Основной layout ─────────────────────────────────────── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Боковая панель ──────────────────────────────────────── */
  .panel {
    width: var(--panel);
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-section {
    padding: 14px 14px 10px;
    border-bottom: 1px solid var(--border);
  }
  .panel-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  /* Поиск */
  .search-wrap { position: relative; }
  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Golos Text', sans-serif;
    font-size: 13px;
    padding: 8px 32px 8px 10px;
    outline: none;
    transition: border-color .2s;
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-clear {
    position: absolute; right: 8px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 13px; display: none;
    padding: 2px;
  }
  .search-clear.vis { display: block; }
  .search-clear:hover { color: var(--accent2); }

  /* Фильтры-чекбоксы */
  .filters { display: flex; flex-direction: column; gap: 6px; }
  .filter-item {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
    padding: 4px 6px;
    border-radius: 6px;
    transition: background .15s;
  }
  .filter-item:hover { background: var(--surface2); }
  .filter-item input[type=checkbox] { display: none; }
  .filter-dot {
    width: 12px; height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
    opacity: .35;
    transition: opacity .2s;
  }
  .filter-item input:checked ~ .filter-dot { opacity: 1; }
  .filter-dot.repair  { background: var(--accent); }
  .filter-dot.hydro1  { background: var(--warn); }
  .filter-dot.hydro2  { background: var(--blue); }
  .filter-text { font-size: 12px; color: var(--muted); transition: color .2s; }
  .filter-item input:checked ~ .filter-dot + .filter-text { color: var(--text); }

  /* Список районов */
  .district-list { display: flex; flex-direction: column; gap: 4px; }
  .dist-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: 6px;
    color: var(--muted);
    font-family: 'Golos Text', sans-serif;
    font-size: 12px;
    text-align: left;
    padding: 5px 8px;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 4px;
  }
  .dist-btn:hover { background: var(--surface2); color: var(--text); }
  .dist-btn.active { border-color: var(--accent); color: var(--accent2); background: rgba(232,93,47,.08); }
  .dist-btn span { color: var(--muted); font-size: 11px; }

  /* Список адресов в панели */
  .addr-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .addr-list::-webkit-scrollbar { width: 4px; }
  .addr-list::-webkit-scrollbar-track { background: transparent; }
  .addr-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .addr-item {
    padding: 9px 10px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all .15s;
    margin-bottom: 4px;
  }
  .addr-item:hover { background: var(--surface2); border-color: var(--border); }
  .addr-item.active { background: rgba(232,93,47,.1); border-color: rgba(232,93,47,.4); }
  .addr-street {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 3px;
  }
  .addr-dots { display: flex; gap: 4px; margin-top: 4px; }
  .dot {
    width: 7px; height: 7px;
    border-radius: 2px;
    opacity: .7;
  }
  .dot.repair { background: var(--accent); }
  .dot.hydro1 { background: var(--warn); }
  .dot.hydro2 { background: var(--blue); }

  .empty-list {
    text-align: center;
    padding: 30px 12px;
    color: var(--muted);
    font-size: 13px;
  }
  .empty-list .big { font-size: 28px; display: block; margin-bottom: 8px; }

  /* ── Карта ───────────────────────────────────────────────── */
  #map {
    flex: 1;
    background: #0d1117;
  }

  /* ── Leaflet переопределения ─────────────────────────────── */
  .leaflet-container {
    font-family: 'Golos Text', sans-serif;
    background: #0d1117;
  }
  .leaflet-tile-pane { filter: brightness(.82) saturate(.7) hue-rotate(5deg); }

  .leaflet-popup-content-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,.6);
    padding: 0;
    color: var(--text);
    min-width: 260px;
    max-width: 320px;
  }
  .leaflet-popup-tip-container { display: none; }
  .leaflet-popup-content { margin: 0; }
  .leaflet-popup-close-button {
    color: var(--muted) !important;
    font-size: 18px !important;
    top: 10px !important;
    right: 10px !important;
  }
  .leaflet-popup-close-button:hover { color: var(--accent2) !important; }

  .mc-dot { /* кастомный маркер */
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2.5px solid var(--bg);
    box-shadow: 0 2px 6px rgba(0,0,0,.5);
    cursor: pointer;
    transition: transform .15s;
  }
  .mc-dot:hover { transform: scale(1.3); }

  /* MarkerCluster кастомизация */
  .marker-cluster-small,
  .marker-cluster-medium,
  .marker-cluster-large {
    background: rgba(232,93,47,.25) !important;
  }
  .marker-cluster-small div,
  .marker-cluster-medium div,
  .marker-cluster-large div {
    background: rgba(232,93,47,.75) !important;
    color: #fff !important;
    font-family: 'Unbounded', sans-serif !important;
    font-size: 11px !important;
    font-weight: 700 !important;
    width: 34px !important;
    height: 34px !important;
    margin: 3px !important;
    line-height: 34px !important;
    border-radius: 50% !important;
  }

  /* Попап-содержимое */
  .popup-inner { padding: 16px; }
  .popup-addr {
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .popup-consumer {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.4;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .popup-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 12px;
  }
  .popup-row:last-child { margin-bottom: 0; }
  .popup-badge {
    flex-shrink: 0;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .4px;
    margin-top: 1px;
  }
  .popup-badge.repair { background: rgba(232,93,47,.2); color: var(--accent2); }
  .popup-badge.hydro1 { background: rgba(210,153,34,.2); color: var(--warn); }
  .popup-badge.hydro2 { background: rgba(88,166,255,.2); color: var(--blue); }
  .popup-dates { color: var(--text); line-height: 1.5; }
  .popup-on { color: var(--success); font-size: 11px; }

  /* ── Мобильный режим: панель снизу ──────────────────────── */
  @media (max-width: 640px) {
    .main { flex-direction: column-reverse; }
    .panel {
      width: 100%;
      height: 220px;
      border-right: none;
      border-top: 1px solid var(--border);
    }
    .panel-filters { display: none; } /* скрываем фильтры на мобиле */
    .topbar-title { font-size: 11px; }
  }
</style>
</head>
<body>

<!-- ── Топбар ───────────────────────────────────────────────── -->
<div class="topbar">
  <a href="index.html" class="back-btn">← Поиск</a>
  <div class="topbar-title">Карта отключений <span>ГВС</span> · Ярославль 2026</div>
  <div class="topbar-sep"></div>
  <div class="counter-chip" id="counterChip">…</div>
</div>

<!-- ── Основной layout ───────────────────────────────────────── -->
<div class="main">

  <!-- Боковая панель -->
  <div class="panel">

    <!-- Поиск -->
    <div class="panel-section">
      <div class="panel-label">Поиск</div>
      <div class="search-wrap">
        <input type="text" id="panelSearch" placeholder="Улица, дом…" autocomplete="off" spellcheck="false">
        <button class="search-clear" id="searchClear" title="Очистить">✕</button>
      </div>
    </div>

    <!-- Фильтры по типу отключения -->
    <div class="panel-section panel-filters">
      <div class="panel-label">Тип отключения</div>
      <div class="filters">
        <label class="filter-item">
          <input type="checkbox" id="fRepair" checked>
          <div class="filter-dot repair"></div>
          <span class="filter-text">Ремонтные работы</span>
        </label>
        <label class="filter-item">
          <input type="checkbox" id="fHydro1" checked>
          <div class="filter-dot hydro1"></div>
          <span class="filter-text">Гидроиспытание 1</span>
        </label>
        <label class="filter-item">
          <input type="checkbox" id="fHydro2" checked>
          <div class="filter-dot hydro2"></div>
          <span class="filter-text">Гидроиспытание 2</span>
        </label>
      </div>
    </div>

    <!-- Список районов -->
    <div class="panel-section panel-filters">
      <div class="panel-label">Район</div>
      <div class="district-list" id="districtList"></div>
    </div>

    <!-- Список адресов -->
    <div class="addr-list" id="addrList"></div>
  </div>

  <!-- Карта -->
  <div id="map"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
// ── Инициализация карты ──────────────────────────────────────
const map = L.map('map', {
  center: [57.6261, 39.8845], // Ярославль
  zoom: 12,
  zoomControl: false,
});
L.control.zoom({ position: 'bottomright' }).addTo(map);

// Тайлы OpenStreetMap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright" style="color:#7d8590">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);

// ── Кластерный слой ──────────────────────────────────────────
const clusterGroup = L.markerClusterGroup({
  maxClusterRadius: 50,
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
  zoomToBoundsOnClick: true,
});
map.addLayer(clusterGroup);

// ── Состояние ────────────────────────────────────────────────
let allPoints   = [];   // {address, lat, lng, records:[]}
let activeAddr  = null;
let activeDistrict = null;

// ── Загрузка данных ──────────────────────────────────────────
async function loadData() {
  const [dataRes, geoRes] = await Promise.all([
    fetch('data.json'),
    fetch('geo.json'),
  ]);
  const data   = await dataRes.json();
  const geoDb  = await geoRes.json();

  // Группируем записи по адресу
  const byAddr = {};
  for (const item of data) {
    if (!byAddr[item.address]) byAddr[item.address] = [];
    byAddr[item.address].push(item);
  }

  // Совмещаем с координатами
  for (const [addr, records] of Object.entries(byAddr)) {
    const geo = geoDb[addr];
    if (!geo) continue; // адрес не геокодирован — пропускаем
    allPoints.push({ address: addr, lat: geo.lat, lng: geo.lng, records });
  }

  buildDistricts();
  renderAll();
}

// ── Список уникальных районов ────────────────────────────────
function buildDistricts() {
  const counts = {};
  for (const pt of allPoints) {
    const d = pt.records[0]?.sheet || 'Другое';
    counts[d] = (counts[d] || 0) + 1;
  }
  const el = document.getElementById('districtList');
  const allBtn = document.createElement('button');
  allBtn.className = 'dist-btn active';
  allBtn.dataset.dist = '';
  allBtn.innerHTML = `Все районы <span>${allPoints.length}</span>`;
  allBtn.onclick = () => setDistrict('', allBtn);
  el.appendChild(allBtn);

  for (const [dist, cnt] of Object.entries(counts).sort()) {
    const btn = document.createElement('button');
    btn.className = 'dist-btn';
    btn.dataset.dist = dist;
    btn.innerHTML = `${dist} <span>${cnt}</span>`;
    btn.onclick = () => setDistrict(dist, btn);
    el.appendChild(btn);
  }
}

function setDistrict(dist, btn) {
  activeDistrict = dist || null;
  document.querySelectorAll('.dist-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

// ── Построение маркеров и списка ────────────────────────────
function getTypeColor(records) {
  // Выбираем наиболее «тяжёлый» тип по приоритету
  const hasRepair = records.some(r => r.repair);
  const hasH2     = records.some(r => r.hydro2);
  const hasH1     = records.some(r => r.hydro1);
  if (hasRepair) return '#e85d2f';
  if (hasH2)     return '#58a6ff';
  if (hasH1)     return '#d29922';
  return '#7d8590';
}

function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div class="mc-dot" style="background:${color}"></div>`,
    iconSize:   [18, 18],
    iconAnchor: [9, 9],
  });
}

function makePopup(pt) {
  const r = pt.records[0];
  const uniq = [...new Set(pt.records.map(x => x.consumer))].join('; ');
  let rows = '';
  if (r.repair) rows += `
    <div class="popup-row">
      <div class="popup-badge repair">Ремонт</div>
      <div class="popup-dates">${r.repair}<br>
        <span class="popup-on">▲ Подключение: ${r.repair_on || '—'}</span>
      </div>
    </div>`;
  if (r.hydro1) rows += `
    <div class="popup-row">
      <div class="popup-badge hydro1">Гидро 1</div>
      <div class="popup-dates">${r.hydro1}<br>
        <span class="popup-on">▲ Подключение: ${r.hydro1_on || '—'}</span>
      </div>
    </div>`;
  if (r.hydro2) rows += `
    <div class="popup-row">
      <div class="popup-badge hydro2">Гидро 2</div>
      <div class="popup-dates">${r.hydro2}<br>
        <span class="popup-on">▲ Подключение: ${r.hydro2_on || '—'}</span>
      </div>
    </div>`;
  return `
    <div class="popup-inner">
      <div class="popup-addr">${pt.address}</div>
      <div class="popup-consumer">${uniq}</div>
      ${rows}
    </div>`;
}

function renderAll() {
  const query  = document.getElementById('panelSearch').value.toLowerCase().trim();
  const fRep   = document.getElementById('fRepair').checked;
  const fH1    = document.getElementById('fHydro1').checked;
  const fH2    = document.getElementById('fHydro2').checked;

  clusterGroup.clearLayers();
  const addrListEl = document.getElementById('addrList');
  addrListEl.innerHTML = '';

  let shown = 0;

  for (const pt of allPoints) {
    // Фильтр района
    if (activeDistrict && pt.records[0]?.sheet !== activeDistrict) continue;

    // Фильтр поиска
    if (query && !pt.address.toLowerCase().includes(query)) continue;

    // Фильтр типа отключения
    const hasRep = pt.records.some(r => r.repair);
    const hasH1  = pt.records.some(r => r.hydro1);
    const hasH2  = pt.records.some(r => r.hydro2);
    const typeOk = (fRep && hasRep) || (fH1 && hasH1) || (fH2 && hasH2);
    if (!typeOk) continue;

    shown++;

    // Маркер
    const color  = getTypeColor(pt.records);
    const marker = L.marker([pt.lat, pt.lng], { icon: makeIcon(color) });
    marker.bindPopup(makePopup(pt), { maxWidth: 320 });
    marker.on('click', () => selectAddr(pt.address));
    clusterGroup.addLayer(marker);
    pt._marker = marker;

    // Элемент списка
    const item = document.createElement('div');
    item.className = 'addr-item' + (pt.address === activeAddr ? ' active' : '');
    item.dataset.addr = pt.address;
    const dots = [
      hasRep ? '<div class="dot repair"></div>' : '',
      hasH1  ? '<div class="dot hydro1"></div>' : '',
      hasH2  ? '<div class="dot hydro2"></div>' : '',
    ].join('');
    item.innerHTML = `<div class="addr-street">${pt.address}</div><div class="addr-dots">${dots}</div>`;
    item.onclick = () => {
      selectAddr(pt.address);
      map.setView([pt.lat, pt.lng], 16, { animate: true });
      pt._marker?.openPopup();
    };
    addrListEl.appendChild(item);
  }

  if (shown === 0) {
    addrListEl.innerHTML = '<div class="empty-list"><span class="big">🔍</span>Ничего не найдено</div>';
  }

  document.getElementById('counterChip').textContent = `${shown} адресов`;
}

function selectAddr(address) {
  activeAddr = address;
  document.querySelectorAll('.addr-item').forEach(el => {
    el.classList.toggle('active', el.dataset.addr === address);
    if (el.dataset.addr === address) el.scrollIntoView({ block: 'nearest' });
  });
}

// ── События ──────────────────────────────────────────────────
document.getElementById('panelSearch').addEventListener('input', function() {
  document.getElementById('searchClear').classList.toggle('vis', this.value.length > 0);
  renderAll();
});
document.getElementById('searchClear').addEventListener('click', function() {
  document.getElementById('panelSearch').value = '';
  this.classList.remove('vis');
  renderAll();
});
['fRepair','fHydro1','fHydro2'].forEach(id => {
  document.getElementById(id).addEventListener('change', renderAll);
});

// ── Старт ────────────────────────────────────────────────────
loadData().catch(err => {
  document.getElementById('addrList').innerHTML =
    `<div class="empty-list"><span class="big">⚠️</span>Ошибка загрузки данных.<br>${err.message}</div>`;
  console.error(err);
});
</script>
</body>
</html>
