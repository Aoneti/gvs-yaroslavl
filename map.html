<script>
'use strict';

// ─── Константы ───────────────────────────────────────────────────────────
var MAP_CENTER       = [57.6261, 39.8845];
var MAP_ZOOM_DEFAULT = 12;
var MAP_ZOOM_FOCUS   = 16;
var CLUSTER_RADIUS   = 50;
var MAX_LIST_ITEMS   = 200;

// ─── normKey ─────────────────────────────────────────────────────────────
function normKey(s) {
  return GVS.normalizeQuery(s).sort().join(' ');
}

// ─── Склонение «адрес» ───────────────────────────────────────────────────
function pluralAddr(n) {
  var mod10 = n % 10, mod100 = n % 100;
  if (mod100 >= 11 && mod100 <= 19) return n + ' адресов';
  if (mod10 === 1)                   return n + ' адрес';
  if (mod10 >= 2 && mod10 <= 4)      return n + ' адреса';
  return n + ' адресов';
}

// ─── Карта ───────────────────────────────────────────────────────────────
var map = L.map('map', {
  center: MAP_CENTER,
  zoom: MAP_ZOOM_DEFAULT,
  attributionControl: true,
});
map.zoomControl.setPosition('bottomleft');
map.attributionControl.setPrefix('<a href="https://leafletjs.com">Leaflet</a>');

var tileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright" style="color:#7d8590">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);

(function() {
  var errorShown = false;
  tileLayer.on('tileerror', function() {
    if (errorShown) return;
    errorShown = true;
    var toast = document.createElement('div');
    toast.style.cssText =
      'position:fixed;top:60px;left:50%;transform:translateX(-50%);' +
      'background:var(--surface);border:1px solid var(--border);color:var(--text);' +
      'padding:8px 18px;border-radius:8px;font-size:13px;z-index:9999;' +
      'box-shadow:0 4px 16px rgba(0,0,0,.4);white-space:nowrap;';
    toast.textContent = '⚠️ Не удалось загрузить карту — проверьте соединение';
    document.body.appendChild(toast);
    setTimeout(function() { toast.remove(); }, 5000);
  });
})();

// ─── Кластерный слой ─────────────────────────────────────────────────────
var clusterGroup = L.markerClusterGroup({
  maxClusterRadius: CLUSTER_RADIUS,
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
  zoomToBoundsOnClick: true,
  iconCreateFunction: function(cluster) {
    var color = getClusterColor(cluster.getAllChildMarkers());
    var count = cluster.getChildCount();
    return L.divIcon({
      html: '<div style="background:' + color + ';opacity:.82;width:34px;height:34px;border-radius:50%;border:2.5px solid #0d1117;box-shadow:0 2px 8px rgba(0,0,0,.55);line-height:30px;text-align:center;color:#fff;font-family:\'Unbounded\',sans-serif;font-size:11px;font-weight:700;">' + count + '</div>',
      className: '',
      iconSize: [40, 40],
      iconAnchor: [20, 20],
    });
  },
});
map.addLayer(clusterGroup);

var allPoints = [];
var activeAddr = null;
var markerColorMap = new Map();

var escapeHtml = GVS.escapeHtml;

// ─── Цвет маркера ────────────────────────────────────────────────────────
function makeIcon(color, approximate) {
  var cls = approximate ? 'mc-dot approximate' : 'mc-dot';
  return L.divIcon({
    className: '',
    html: '<div class="' + cls + '" style="background:' + color + '"></div>',
    iconSize: [18, 18],
    iconAnchor: [9, 9],
  });
}

var COLOR_PRIORITY = { '#e85d2f': 0, '#d29922': 1, '#58a6ff': 2, '#3fb950': 3, '#7d8590': 4 };

function getClusterColor(children) {
  var best = '#7d8590', bestRank = 99;
  for (var i = 0; i < children.length; i++) {
    var c = markerColorMap.get(children[i]) || '#7d8590';
    var rank = COLOR_PRIORITY[c] !== undefined ? COLOR_PRIORITY[c] : 99;
    if (rank < bestRank) { best = c; bestRank = rank; }
  }
  return best;
}

// ─── Попап ───────────────────────────────────────────────────────────────
function makePopup(pt) {
  var rows = '';
  for (var i = 0; i < pt.records.length; i++) {
    var r = pt.records[i];
    var fields = [
      { key: 'repair', label: 'Ремонт',   on: r.repair_on },
      { key: 'hydro1', label: 'Гидро 1',  on: r.hydro1_on },
      { key: 'hydro2', label: 'Гидро 2',  on: r.hydro2_on },
    ];
    for (var j = 0; j < fields.length; j++) {
      var f = fields[j];
      var val = r[f.key];
      if (!val) continue;
      var content = GVS.isDateValue(val)
        ? '<div class="popup-dates">' + escapeHtml(val) + (f.on ? '<br><span class="popup-on">\u25b2 \u0432\u043e\u0434\u0430 \u0441 ' + escapeHtml(f.on) + '</span>' : '') + '</div>'
        : '<div class="popup-note">' + escapeHtml(val) + '</div>';
      rows += '<div class="popup-row"><div class="popup-badge ' + f.key + '">' + f.label + '</div>' + content + '</div>';
    }
  }
  if (!rows) rows = '<div class="popup-dates" style="color:var(--muted);font-style:italic">Нет данных</div>';

  var approxBadge = pt.approximate
    ? '<div class="popup-approx-badge">⚠️ Координаты приблизительны — маркер указывает на улицу, а не на конкретный дом</div>'
    : '';

  return '<div class="popup-inner"><div class="popup-addr">' + escapeHtml(pt.address) + '</div>' + rows + approxBadge + '</div>';
}

// ─── Загрузка данных ─────────────────────────────────────────────────────
function loadData() {

  return Promise.all([
    fetch('data.json'),
    fetch('geo.json'),
  ]).then(function(responses) {
    if (!responses[0].ok) throw new Error('data.json: HTTP ' + responses[0].status);
    if (!responses[1].ok) throw new Error('geo.json: HTTP ' + responses[1].status);
    return Promise.all([responses[0].json(), responses[1].json()]);
  }).then(function(results) {
    var data  = results[0];
    var geoDb = results[1];

    if (!geoDb || typeof geoDb !== 'object' || !Object.keys(geoDb).length) {
      throw new Error('geo.json пустой или повреждён');
    }

    // normKey сортирует токены → порядконезависимый матчинг
    var geoIdx = {};
    var entries = Object.entries(geoDb);
    for (var i = 0; i < entries.length; i++) {
      var k = entries[i][0], v = entries[i][1];
      if (v && typeof v.lat === 'number' && typeof v.lng === 'number') {
        geoIdx[normKey(k)] = v;
      }
    }

    // Группируем по адресу
    var byAddr = {};
    for (var d = 0; d < data.length; d++) {
      var item = data[d];
      if (!byAddr[item.address]) byAddr[item.address] = [];
      byAddr[item.address].push(item);
    }

    var today = GVS.makeToday();

    var matched = 0, missed = 0;
    var addrEntries = Object.entries(byAddr);
    for (var a = 0; a < addrEntries.length; a++) {
      var addr    = addrEntries[a][0];
      var records = addrEntries[a][1];
      var geo = geoIdx[normKey(addr)];
      if (!geo) { missed++; continue; }
      matched++;
      var color       = GVS.getMapColor(records, today);
      var approximate = geo.approximate === true;
      var pt = {
        address: addr,
        lat: geo.lat, lng: geo.lng,
        records: records,
        approximate: approximate,
        _normTokens: GVS.normalizeQuery(addr),
      };
      var marker = L.marker([pt.lat, pt.lng], { icon: makeIcon(color, approximate) });

      markerColorMap.set(marker, color);

      marker.bindPopup(makePopup(pt), { maxWidth: 320 });
      marker.on('click', (function(address) {
        return function() { selectAddr(address); };
      })(pt.address));
      pt._marker = marker;
      allPoints.push(pt);
    }

    console.log('[map] geo совпало: ' + matched + ', без координат: ' + missed);

    var chip = document.getElementById('counterChip');
    if (missed > 0) chip.title = missed + ' адресов не показаны (нет координат в geo.json)';

    renderAll();
  });
}

// ─── Состояние видимых маркеров для диффного обновления ──────────────────
var _visibleSet = new Set();

// ─── Рендер + ограничение списка ─────────────────────────────────────────
function renderAll() {
  var tokens = GVS.normalizeQuery(document.getElementById('panelSearch').value);
  var fRep   = document.getElementById('fRepair').checked;
  var fH1    = document.getElementById('fHydro1').checked;
  var fH2    = document.getElementById('fHydro2').checked;

  var visiblePts = [];
  var fragment   = document.createDocumentFragment();
  var listCount  = 0;

  for (var i = 0; i < allPoints.length; i++) {
    var pt = allPoints[i];
    var matchSearch = !tokens.length || tokens.every(function(t) {
      return pt._normTokens.some(function(nt) {
        return nt === t || nt.startsWith(t);
      });
    });

    var hasRep = pt.records.some(function(r) { return GVS.isDateValue(r.repair); });
    var hasH1  = pt.records.some(function(r) { return GVS.isDateValue(r.hydro1); });
    var hasH2  = pt.records.some(function(r) { return GVS.isDateValue(r.hydro2); });
    var matchFilter = (fRep && hasRep) || (fH1 && hasH1) || (fH2 && hasH2);

    if (!matchSearch || !matchFilter) continue;

    visiblePts.push(pt);

    if (listCount < MAX_LIST_ITEMS) {
      var item = document.createElement('div');
      item.className = 'addr-item' + (pt.address === activeAddr ? ' active' : '');
      item.dataset.addr = pt.address;
      item.innerHTML =
        '<div class="addr-street">' + escapeHtml(pt.address) +
        (pt.approximate ? ' <span style="color:var(--muted);font-size:10px">~</span>' : '') +
        '</div>' +
        '<div class="addr-dots">' +
          (hasRep ? '<div class="dot repair"></div>' : '') +
          (hasH1  ? '<div class="dot hydro1"></div>' : '') +
          (hasH2  ? '<div class="dot hydro2"></div>' : '') +
        '</div>';
      (function(capturedPt) {
        item.addEventListener('click', function() {
          selectAddr(capturedPt.address);
          map.setView([capturedPt.lat, capturedPt.lng], MAP_ZOOM_FOCUS, { animate: true });
          if (capturedPt._marker) capturedPt._marker.openPopup();
        });
      })(pt);
      fragment.appendChild(item);
      listCount++;
    }
  }

  var visibleAddrs = new Set(visiblePts.map(function(p) { return p.address; }));
  if (activeAddr && !visibleAddrs.has(activeAddr)) {
    activeAddr = null;
  }

  // Плашка с количеством скрытых адресов
  if (visiblePts.length > MAX_LIST_ITEMS) {
    var overflow = document.createElement('div');
    overflow.className = 'addr-overflow';
    overflow.textContent = '↑ и ещё ' + (visiblePts.length - MAX_LIST_ITEMS) + ' — уточните поиск';
    fragment.appendChild(overflow);
  }

  var newSet = new Set(visiblePts.map(function(p) { return p._marker; }));
  var toRemove = [];
  var toAdd    = [];
  _visibleSet.forEach(function(m) { if (!newSet.has(m)) toRemove.push(m); });
  newSet.forEach(function(m) { if (!_visibleSet.has(m)) toAdd.push(m); });
  if (toRemove.length) clusterGroup.removeLayers(toRemove);
  if (toAdd.length)    clusterGroup.addLayers(toAdd);
  _visibleSet = newSet;

  var listEl = document.getElementById('addrList');
  listEl.innerHTML = '';
  if (visiblePts.length) {
    listEl.appendChild(fragment);
  } else {
    listEl.innerHTML = '<div class="empty-list"><span class="big">🔍</span>Ничего не найдено. Попробуйте другое написание или воспользуйтесь основным поиском</div>';
  }

  document.getElementById('counterChip').textContent = pluralAddr(visiblePts.length);
}

function selectAddr(address) {
  activeAddr = address;
  document.querySelectorAll('.addr-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.addr === address);
    if (el.dataset.addr === address) el.scrollIntoView({ block: 'nearest' });
  });
}

// ─── События ─────────────────────────────────────────────────────────────
var _mapSearchDebounce;
document.getElementById('panelSearch').addEventListener('input', function() {
  document.getElementById('searchClear').classList.toggle('vis', this.value.length > 0);
  clearTimeout(_mapSearchDebounce);
  _mapSearchDebounce = setTimeout(renderAll, 150);
});
document.getElementById('searchClear').addEventListener('click', function() {
  document.getElementById('panelSearch').value = '';
  this.classList.remove('vis');
  renderAll();
});
['fRepair', 'fHydro1', 'fHydro2'].forEach(function(id) {
  document.getElementById(id).addEventListener('change', renderAll);
});

// ─── Bottom sheet drag handle (только mobile) ────────────────────────────
(function() {
  var handle = document.getElementById('sheetHandle');
  var panel  = handle.parentElement;
  var SNAP_RATIOS = [0.30, 0.60, 0.85];
  var dragging = false, startY = 0, startH = 0;

  function isMobile() { return window.innerWidth <= 640; }

  function snapHeight(h) {
    var vh    = window.innerHeight;
    var snaps = SNAP_RATIOS.map(function(r) { return Math.round(vh * r); });
    return snaps.reduce(function(a, b) { return Math.abs(b - h) < Math.abs(a - h) ? b : a; });
  }

  function onMove(e) {
    if (!dragging) return;
    if (e.cancelable) e.preventDefault();
    var y    = e.touches ? e.touches[0].clientY : e.clientY;
    var newH = startH - (y - startY);
    panel.style.height = Math.min(Math.max(newH, 80), window.innerHeight * 0.88) + 'px';
    panel.style.transition = 'none';
  }

  function onEnd() {
    if (!dragging) return;
    dragging = false;
    panel.style.transition = 'height .3s ease';
    panel.style.height = snapHeight(panel.offsetHeight) + 'px';
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup',   onEnd);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend',  onEnd);
  }

  function onStart(e) {
    if (!isMobile()) return;
    dragging = true;
    startY = e.touches ? e.touches[0].clientY : e.clientY;
    startH = panel.offsetHeight;
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onEnd);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend',  onEnd);
  }

  function initHeight() {
    panel.style.height = isMobile() ? Math.round(window.innerHeight * SNAP_RATIOS[0]) + 'px' : '';
  }

  handle.addEventListener('mousedown',  onStart);
  handle.addEventListener('touchstart', onStart, { passive: true });
  window.addEventListener('resize', initHeight);
  initHeight();
})();

// ─── Запуск ──────────────────────────────────────────────────────────────
loadData().catch(function(err) {
  document.getElementById('addrList').innerHTML =
    '<div class="empty-list"><span class="big">⚠️</span>Ошибка загрузки данных.<br><small style="color:var(--muted)">' + GVS.escapeHtml(err.message) + '</small></div>';
  document.getElementById('counterChip').textContent = 'Ошибка';
  console.error('[map] loadData failed:', err);
});
</script>
