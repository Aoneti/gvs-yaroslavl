<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self' https://mc.yandex.ru;

               font-src 'self';
               img-src 'self' data: https://*.tile.openstreetmap.org https://mc.yandex.ru;
               connect-src 'self' https://mc.yandex.ru https://*.tile.openstreetmap.org;
               frame-src 'none';">

<title>Карта отключений ГВС в Ярославле — 2026</title>
<meta name="description" content="Проверьте график отключения горячей воды в Ярославле в 2026 году. Поиск по адресу: даты ремонта, гидравлических испытаний и включения ГВС">
<meta name="keywords" content="отключение воды Ярославль, отключение горячей воды Ярославль 2026, график ГВС Ярославль, гидравлические испытания Ярославль, когда включат горячую воду Ярославль, ремонт теплосети Ярославль">
<link rel="canonical" href="https://aoneti.github.io/gvs-yaroslavl/map.html">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
<script src="theme-init.js"></script>
<link rel="stylesheet" href="vendor/leaflet.css">
<link rel="stylesheet" href="vendor/MarkerCluster.css">
<link rel="stylesheet" href="vendor/MarkerCluster.Default.css">
<link rel="stylesheet" href="styles.css">

<style>
  :root      { --panel: 280px; }
  html.light { --panel: 280px; }

  html.light #map                { background: #e8e4dc; }
  html.light .leaflet-container  { background: #e8e4dc; }
  html.light .leaflet-tile-pane  { filter: brightness(1.05) saturate(0.85); }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Golos Text', system-ui, -apple-system, 'Segoe UI', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 1000;
  }
  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Golos Text', system-ui, -apple-system, 'Segoe UI', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    transition: border-color .2s, color .2s;
    white-space: nowrap;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .topbar-title {
    font-family: 'Unbounded', system-ui, sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .topbar-title span { color: var(--accent); }
  .topbar-sep { flex: 1; }
  .counter-chip {
    background: rgba(232,93,47,.15);
    border: 1px solid rgba(232,93,47,.3);
    color: var(--accent2);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
    cursor: default;
  }

  .main { display: flex; flex: 1; overflow: hidden; }
  .panel {
    width: var(--panel);
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-section { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); }
  .panel-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .search-wrap { position: relative; }
  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Golos Text', system-ui, -apple-system, 'Segoe UI', sans-serif;
    font-size: 13px;
    padding: 8px 32px 8px 10px;
    outline: none;
    transition: border-color .2s;
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-clear {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    display: none;
    padding: 2px;
  }
  .search-clear.vis { display: block; }
  .search-clear:hover { color: var(--accent2); }

  .filters { display: flex; flex-direction: column; gap: 6px; }
  .filter-item {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
    padding: 4px 6px;
    border-radius: 6px;
    transition: background .15s;
  }
  .filter-item:hover { background: var(--surface2); }
  .filter-item input[type=checkbox] { display: none; }
  .filter-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
    opacity: .35;
    transition: opacity .2s;
  }
  .filter-item input:checked ~ .filter-dot { opacity: 1; }
  .filter-dot.repair { background: var(--accent); }
  .filter-dot.hydro1 { background: var(--warn); }
  .filter-dot.hydro2 { background: var(--blue); }
  .filter-text { font-size: 12px; color: var(--muted); transition: color .2s; }
  .filter-item input:checked ~ .filter-dot + .filter-text { color: var(--text); }

  .addr-list { flex: 1; overflow-y: auto; padding: 8px; }
  .addr-list::-webkit-scrollbar { width: 4px; }
  .addr-list::-webkit-scrollbar-track { background: transparent; }
  .addr-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Skeleton loader */
  .sk-item {
    height: 52px;
    background: var(--surface2);
    border-radius: 8px;
    margin-bottom: 6px;
    position: relative;
    overflow: hidden;
  }
  .sk-item::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.06) 50%, transparent 100%);
    animation: sk-shimmer 1.4s infinite;
  }
  @keyframes sk-shimmer {
    from { transform: translateX(-100%); }
    to   { transform: translateX(100%); }
  }

  .addr-item {
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all .15s;
    margin-bottom: 5px;
  }
  .addr-item:hover { background: var(--surface2); border-color: var(--border); }
  .addr-item.active { background: rgba(232,93,47,.1); border-color: rgba(232,93,47,.4); }
  .addr-street { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 5px; }
  .addr-dots { display: flex; gap: 5px; margin-top: 5px; }
  .dot { width: 9px; height: 9px; border-radius: 2px; opacity: .8; }
  .dot.repair { background: var(--accent); }
  .dot.hydro1 { background: var(--warn); }
  .dot.hydro2 { background: var(--blue); }

  .addr-overflow {
    text-align: center;
    padding: 10px 8px 6px;
    font-size: 12px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  .empty-list { text-align: center; padding: 30px 12px; color: var(--muted); font-size: 13px; }
  .empty-list .big { font-size: 28px; display: block; margin-bottom: 8px; }

  #map { flex: 1; background: #0d1117; }

  /* Leaflet — единый шрифт Golos Text */
  .leaflet-container {
    font-family: 'Golos Text', system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: #0d1117;
  }
  .leaflet-tile-pane { filter: brightness(.82) saturate(.7) hue-rotate(5deg); }

  .leaflet-popup-content-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,.6);
    padding: 0;
    color: var(--text);
    min-width: 260px;
    max-width: 320px;
  }
  .leaflet-popup-tip-container { display: none; }
  .leaflet-popup-content {
    margin: 0;
    font-family: 'Golos Text', system-ui, -apple-system, 'Segoe UI', sans-serif;
    font-size: 13px;
    line-height: 1.5;
  }
  .leaflet-popup-close-button { color: var(--muted) !important; font-size: 18px !important; top: 10px !important; right: 10px !important; }
  .leaflet-popup-close-button:hover { color: var(--accent2) !important; }

  .mc-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2.5px solid var(--bg);
    box-shadow: 0 2px 6px rgba(0,0,0,.5);
    cursor: pointer;
    transition: transform .15s;
  }
  .mc-dot:hover { transform: scale(1.3); }
  .mc-dot.approximate { border-style: dashed; opacity: 0.65; }
  .mc-dot.approximate:hover { opacity: 1; }
  .marker-cluster, .marker-cluster div { background: transparent !important; }
  .marker-cluster-small,
  .marker-cluster-medium,
  .marker-cluster-large { background: transparent !important; }
  .marker-cluster-small div,
  .marker-cluster-medium div,
  .marker-cluster-large div { background: transparent !important; color: transparent !important; }

  .popup-inner { padding: 16px; }
  .popup-addr {
    font-family: 'Golos Text', system-ui, sans-serif;
    font-size: 13px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 12px;
  }
  .popup-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; font-size: 12px; }
  .popup-row:last-child { margin-bottom: 0; }
  .popup-badge {
    flex-shrink: 0;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .4px;
    margin-top: 1px;
  }
  .popup-badge.repair { background: rgba(232,93,47,.2);  color: var(--accent2); }
  .popup-badge.hydro1 { background: rgba(210,153,34,.2); color: var(--warn); }
  .popup-badge.hydro2 { background: rgba(88,166,255,.2); color: var(--blue); }
  .popup-dates { color: var(--text); line-height: 1.5; }
  .popup-on    { color: var(--success); font-size: 11px; }
  .popup-note  { color: var(--muted); font-style: italic; font-size: 11px; }

  .popup-approx-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    padding: 6px 10px;
    background: rgba(210,153,34,0.12);
    border: 1px solid rgba(210,153,34,0.3);
    border-radius: 6px;
    font-size: 11px;
    color: var(--warn);
  }

  .sheet-handle {
    display: none;
    justify-content: center;
    align-items: center;
    height: 22px;
    cursor: ns-resize;
    flex-shrink: 0;
    touch-action: none;
  }
  .sheet-handle::after {
    content: '';
    width: 36px;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
  }

  @media (max-width: 640px) {
    .main { flex-direction: column-reverse; }
    .panel {
      width: 100%;
      height: 30dvh;
      min-height: 110px;
      max-height: 85dvh;
      border-right: none;
      border-top: 1px solid var(--border);
      transition: height .3s ease;
      flex-shrink: 0;
    }
    .sheet-handle { display: flex; }
    .topbar-title { font-size: 11px; }
    .panel-filters { display: block; padding: 6px 10px; border-bottom: 1px solid var(--border); }
    .panel-filters .panel-label { display: none; }
    .filters {
      flex-direction: row;
      overflow-x: auto;
      gap: 6px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-item {
      flex-shrink: 0;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 10px;
      background: var(--surface2);
    }
    .filter-dot { width: 8px; height: 8px; }
    .filter-text { font-size: 12px; }
    .search-wrap input { font-size: 15px; padding: 12px 36px 12px 12px; }
    .search-clear { font-size: 16px; right: 10px; }
  }
</style>

</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn">← Поиск</a>
  <div class="topbar-title">Карта отключений <span>ГВС</span> · Ярославль 2026</div>
  <div class="topbar-sep"></div>
  <div class="counter-chip" id="counterChip" title="">…</div>
</div>

<div class="main">
  <div class="panel">
    <div class="sheet-handle" id="sheetHandle"></div>

    <div class="panel-section">
      <div class="panel-label">Поиск</div>
      <div class="search-wrap">
        <input type="text" id="panelSearch" placeholder="Улица, дом…" autocomplete="off" spellcheck="false"
               aria-label="Поиск по адресу на карте" aria-expanded="false" aria-autocomplete="list">
        <button class="search-clear" id="searchClear" title="Очистить" aria-label="Очистить поле поиска" type="button">✕</button>
      </div>
    </div>

    <div class="panel-section panel-filters">
      <div class="panel-label">Тип отключения</div>
      <div class="filters">
        <label class="filter-item">
          <input type="checkbox" id="fRepair" checked>
          <div class="filter-dot repair"></div>
          <span class="filter-text">Ремонтные работы</span>
        </label>
        <label class="filter-item">
          <input type="checkbox" id="fHydro1" checked>
          <div class="filter-dot hydro1"></div>
          <span class="filter-text">Гидроиспытания 1</span>
        </label>
        <label class="filter-item">
          <input type="checkbox" id="fHydro2" checked>
          <div class="filter-dot hydro2"></div>
          <span class="filter-text">Гидроиспытания 2</span>
        </label>
      </div>
    </div>

    <div class="addr-list" id="addrList">
      <div class="sk-item"></div>
      <div class="sk-item"></div>
      <div class="sk-item"></div>
      <div class="sk-item"></div>
      <div class="sk-item"></div>
    </div>
  </div>

  <div id="map"></div>
</div>

<script src="vendor/leaflet.js"></script>
<script src="vendor/leaflet.markercluster.js"></script>
<script src="config.js"></script>
<script src="gvs-core.js"></script>
<script src="app-map.js"></script>
