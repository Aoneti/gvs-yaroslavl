  /* Stats bar */

  /* Results */

  .card-header {

  /* Pagination */

<body>
<div class="container">
  <header>
    <div class="logo-icon">🔥</div>
    <h1>Отключение <span>горячей воды</span><br>в Ярославле 2026</h1>
    <div class="header-actions">
      <a href="map.html" class="map-btn">🗺️ Смотреть на карте</a>
    </div>
  </header>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Введите улицу и дом..." autocomplete="off" spellcheck="false">
    <button class="clear-btn" id="clearBtn" title="Очистить">✕</button>
  </div>

  <div id="statsBar" class="stats" style="display:none">
    <div class="stat-chip">Найдено: <strong id="foundCount">0</strong></div>
  </div>

  <div id="results"></div>
  <div class="pagination" id="pagination" style="display:none"></div>
</div>

<script>
// ─── Состояние ────────────────────────────────────────────────────────
let DATA        = [];
let filtered    = [];
let currentPage = 1;
const PER_PAGE  = 20;

// ─── DOM ──────────────────────────────────────────────────────────────
const searchInput  = document.getElementById('searchInput');
const clearBtn     = document.getElementById('clearBtn');
const resultsEl    = document.getElementById('results');
const statsBar     = document.getElementById('statsBar');
const foundCount   = document.getElementById('foundCount');
const paginationEl = document.getElementById('pagination');

// ─── Нормализация для поиска ──────────────────────────────────────────
// Убираем знаки препинания, "д.", "д", лишние пробелы — чтобы
// "Толбухина 6" находило "Толбухина, д.6" и "Толбухина д. 6"
function normalizeQuery(s) {
  return s.toLowerCase()
    .replace(/[,\.]/g, ' ')       // запятые и точки → пробел
    .replace(/\bд\b/g, ' ')       // отдельное "д" → пробел
    .replace(/\bул\b/g, ' ')      // "ул" → пробел
    .replace(/\bпр-кт\b/g, ' ')   // "пр-кт" → пробел
    .replace(/\bпр\b/g, ' ')      // "пр" → пробел
    .replace(/\s+/g, ' ')
    .trim();
}

// ─── Подсветка совпадений ─────────────────────────────────────────────
function hl(text, q) {
  if (!q) return text;
  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

// ─── Карточка адреса (без потребителя и без плашки района) ────────────
function renderCard(d, q) {
  const periods = [
    d.repair
      ? `<div class="period-item repair">
           <div class="period-label">Текущий ремонт</div>
           <div class="period-dates">${d.repair}</div>
           ${d.repair_on ? `<div class="period-on">✓ включение: ${d.repair_on}</div>` : ''}
         </div>` : '',
    d.hydro1
      ? `<div class="period-item hydro1">
           <div class="period-label">Гидроиспытания 1</div>
           <div class="period-dates">${d.hydro1}</div>
           ${d.hydro1_on ? `<div class="period-on">✓ включение: ${d.hydro1_on}</div>` : ''}
         </div>` : '',
    d.hydro2
      ? `<div class="period-item hydro2">
           <div class="period-label">Гидроиспытания 2</div>
           <div class="period-dates">${d.hydro2}</div>
           ${d.hydro2_on ? `<div class="period-on">✓ включение: ${d.hydro2_on}</div>` : ''}
         </div>` : '',
  ].filter(Boolean).join('') || '<div class="period-empty">Нет данных о периодах</div>';

  return `
    <div class="result-card">
      <div class="card-header">
        <div class="address-badge">${hl(d.address, q)}</div>
      </div>
      <div class="periods-grid">${periods}</div>
      ${d.source ? `<div class="card-footer"><span class="source-tag">🔥 ${d.source}</span></div>` : ''}
    </div>`;
}

// ─── Рендер страницы результатов ──────────────────────────────────────
function renderPage() {
  const q     = searchInput.value.trim();
  const start = (currentPage - 1) * PER_PAGE;
  const page  = filtered.slice(start, start + PER_PAGE);

  resultsEl.innerHTML = page.length
    ? page.map(d => renderCard(d, q)).join('')
    : `<div class="state-message">
         <span class="emoji">🤔</span>
         <h3>Ничего не найдено</h3>
         <p>Попробуйте другое написание адреса</p>
       </div>`;

  renderPagination();
}

// ─── Пагинация ────────────────────────────────────────────────────────
function renderPagination() {
  const total = Math.ceil(filtered.length / PER_PAGE);

  if (total <= 1) {
    paginationEl.style.display = 'none';
    return;
  }

  paginationEl.style.display = 'flex';

  let pages = [];
  if (total <= 7) {
    pages = Array.from({length: total}, (_, i) => i + 1);
  } else {
    pages = [1];
    if (currentPage > 3) pages.push('…');
    for (let p = Math.max(2, currentPage - 1); p <= Math.min(total - 1, currentPage + 1); p++) pages.push(p);
    if (currentPage < total - 2) pages.push('…');
    pages.push(total);
  }

  let html = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← Назад</button>`;
  pages.forEach(p => {
    html += p === '…'
      ? `<span class="page-info">…</span>`
      : `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
  });
  html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === total ? 'disabled' : ''}>Вперёд →</button>`;
  html += `<span class="page-info">${currentPage} / ${total}</span>`;

  paginationEl.innerHTML = html;
}

function goPage(n) {
  const total = Math.ceil(filtered.length / PER_PAGE);
  currentPage = Math.max(1, Math.min(n, total));
  renderPage();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// ─── Поиск ────────────────────────────────────────────────────────────
function applySearch() {
  const raw = searchInput.value.trim();
  clearBtn.classList.toggle('visible', raw.length > 0);

  if (!raw) {
    filtered = [];
    resultsEl.innerHTML = `<div class="state-message">
      <span class="emoji">🏡</span>
      <h3>Найдите свой адрес</h3>
      <p>Введите улицу и номер дома — покажем даты отключения горячей воды</p>
    </div>`;
    statsBar.style.display = 'none';
    paginationEl.style.display = 'none';
    return;
  }

  // Нормализуем запрос и ищем по нормализованному адресу
  const q = normalizeQuery(raw);
  const tokens = q.split(' ').filter(Boolean);   // все слова запроса

  filtered = DATA.filter(d => {
    const addr = normalizeQuery(d.address);
    return tokens.every(token => addr.includes(token));  // все слова должны присутствовать
  });

  currentPage = 1;
  statsBar.style.display = 'flex';
  foundCount.textContent = filtered.length;
  renderPage();
}

// ─── События ──────────────────────────────────────────────────────────
searchInput.addEventListener('input', applySearch);

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  applySearch();
  searchInput.focus();
});

document.querySelectorAll('.hint').forEach(btn => {
  btn.addEventListener('click', () => {
    searchInput.value = btn.textContent;
    applySearch();
  });
});

// ─── Загрузка data.json ───────────────────────────────────────────────
resultsEl.innerHTML = `<div class="state-message">
  <span class="emoji">⏳</span>
  <h3>Загрузка данных…</h3>
  <p>Подождите секунду</p>
</div>`;

fetch('data.json')
  .then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(json => {
    DATA = json;
    resultsEl.innerHTML = `<div class="state-message">
      <span class="emoji">🏡</span>
      <h3>Найдите свой адрес</h3>
      <p>Введите улицу и номер дома — покажем даты отключения горячей воды</p>
    </div>`;
  })
  .catch(err => {
    console.error(err);
    resultsEl.innerHTML = `<div class="state-message">
      <span class="emoji">❌</span>
      <h3>Не удалось загрузить данные</h3>
    </div>`;
  });
</script>
