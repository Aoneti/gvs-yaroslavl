<script>
// ─── Тема ───────────────────────────────────────────────────────────────
(function() {
  if (localStorage.getItem('theme') === 'light') document.documentElement.classList.add('light');
})();
document.getElementById('themeToggle').addEventListener('click', () => {
  const isLight = document.documentElement.classList.toggle('light');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
});

// ─── Состояние ──────────────────────────────────────────────────────────
const PER_PAGE = GVS.PER_PAGE; // из gvs-core.js — больше не магическое число

let DATA        = [];
let filtered    = [];
let currentPage = 1;
let dataLoaded  = false;          // ИСПРАВЛЕНО: флаг для race condition

// ─── DOM ────────────────────────────────────────────────────────────────
const searchInput  = document.getElementById('searchInput');
const clearBtn     = document.getElementById('clearBtn');
const resultsEl    = document.getElementById('results');
const statsBar     = document.getElementById('statsBar');
const foundCount   = document.getElementById('foundCount');
const paginationEl = document.getElementById('pagination');

// ─── Подсветка совпадений ───────────────────────────────────────────────
// ИСПРАВЛЕНО: принимает массив токенов (нормализованных), а не сырую строку.
// Длинные токены обрабатываются первыми — предотвращаем вложенные <mark>.
function hl(text, tokens) {
  let safe = GVS.escapeHtml(text);
  if (!tokens || !tokens.length) return safe;
  const sorted = [...tokens].sort((a, b) => b.length - a.length);
  for (const token of sorted) {
    if (!token) continue;
    const escaped = token.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    safe = safe.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
  }
  return safe;
}

// ─── Текущие токены поиска (модульный уровень, без передачи через цепочку) ──
let _currentTokens = [];

// ─── Рендер одного блока периода ────────────────────────────────────────
// ИСПРАВЛЕНО: текстовые значения («По распоряжению…», «снесен» и т.д.)
// отображаются как заметка, а не как псевдо-дата.
function renderPeriodItem(type, label, rangeStr, onStr) {
  if (!rangeStr) return '';
  const isDate = GVS.isDateValue(rangeStr);
  const inner = isDate
    ? `<div class="period-dates">${GVS.escapeHtml(rangeStr)}</div>
       ${onStr ? `<div class="period-on">✓ включение: ${GVS.escapeHtml(onStr)}</div>` : ''}`
    : `<div class="period-note">${GVS.escapeHtml(rangeStr)}</div>`;
  return `<div class="period-item ${type}">
    <div class="period-label">${label}</div>
    ${inner}
  </div>`;
}

// ─── Карточка адреса ────────────────────────────────────────────────────
function renderCard(d) {
  const status   = GVS.getStatus(d);
  const daysInfo = GVS.getDaysInfo(d);

  let daysChip = '';
  if (daysInfo) {
    if (daysInfo.type === 'active') {
      const label = daysInfo.days <= 0 ? 'последний день'
                  : daysInfo.days === 1 ? 'ещё 1 день'
                  : `ещё ${daysInfo.days} дн.`;
      daysChip = `<span class="days-chip active">${label}</span>`;
    } else if (daysInfo.type === 'soon') {
      const label = daysInfo.days === 1 ? 'завтра' : `через ${daysInfo.days} дн.`;
      daysChip = `<span class="days-chip soon">${label}</span>`;
    }
  }

  const statusBadge =
    status === 'active' ? '<span class="status-badge active">● Нет воды</span>' :
    status === 'soon'   ? '<span class="status-badge soon">⚡ Скоро</span>'    :
    status === 'past'   ? '<span class="status-badge past">Завершено</span>'   : '';
  const cardClass = status === 'active' ? ' status-active'
                  : status === 'past'   ? ' status-past' : '';

  const periodsHtml = [
    renderPeriodItem('repair', 'Текущий ремонт',     d.repair,  d.repair_on),
    renderPeriodItem('hydro1', 'Гидроиспытания 1',   d.hydro1,  d.hydro1_on),
    renderPeriodItem('hydro2', 'Гидроиспытания 2',   d.hydro2,  d.hydro2_on),
  ].filter(Boolean).join('') || '<div class="period-empty">Нет данных о периодах</div>';

  return `
    <div class="result-card${cardClass}">
      <div class="card-header">
        <div class="address-badge">${hl(d.address, _currentTokens)}${daysChip}</div>
        ${statusBadge}
      </div>
      <div class="periods-grid">${periodsHtml}</div>
      ${d.source ? `<div class="card-footer"><span class="source-tag">🏘️ ${GVS.escapeHtml(d.source)}</span></div>` : ''}
    </div>`;
}

// ─── Рендер страницы результатов ────────────────────────────────────────
function renderPage() {
  const start = (currentPage - 1) * PER_PAGE;
  const page  = filtered.slice(start, start + PER_PAGE);

  resultsEl.innerHTML = page.length
    ? page.map(d => renderCard(d)).join('')
    : `<div class="state-message">
         <span class="emoji">🤔</span>
         <h3>Ничего не найдено</h3>
         <p>Попробуйте другое написание адреса</p>
       </div>`;

  renderPagination();
}

// ─── Пагинация ───────────────────────────────────────────────────────────
function renderPagination() {
  const total = Math.ceil(filtered.length / PER_PAGE);
  if (total <= 1) { paginationEl.style.display = 'none'; return; }

  paginationEl.style.display = 'flex';
  let pages = [];
  if (total <= 7) {
    pages = Array.from({length: total}, (_, i) => i + 1);
  } else {
    pages = [1];
    if (currentPage > 3) pages.push('…');
    for (let p = Math.max(2, currentPage - 1); p <= Math.min(total - 1, currentPage + 1); p++) pages.push(p);
    if (currentPage < total - 2) pages.push('…');
    pages.push(total);
  }

  let html = `<button class="page-btn" data-page="${currentPage - 1}" ${currentPage === 1 ? 'disabled' : ''}>← Назад</button>`;
  pages.forEach(p => {
    html += p === '…'
      ? `<span class="page-info">…</span>`
      : `<button class="page-btn ${p === currentPage ? 'active' : ''}" data-page="${p}">${p}</button>`;
  });
  html += `<button class="page-btn" data-page="${currentPage + 1}" ${currentPage === total ? 'disabled' : ''}>Вперёд →</button>`;
  html += `<span class="page-info">${currentPage} / ${total}</span>`;
  paginationEl.innerHTML = html;
}

function goPage(n) {
  const total = Math.ceil(filtered.length / PER_PAGE);
  currentPage = Math.max(1, Math.min(n, total));
  renderPage();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── Поиск ───────────────────────────────────────────────────────────────
function applySearch() {
  const raw = searchInput.value.trim();
  clearBtn.classList.toggle('visible', raw.length > 0);

  if (!raw) {
    _currentTokens = [];
    filtered = [];
    resultsEl.innerHTML = `<div class="state-message">
      <span class="emoji">🏡</span>
      <h3>Найдите свой адрес</h3>
      <p>Введите улицу и номер дома — покажем даты отключения горячей воды</p>
    </div>`;
    statsBar.style.display = 'none';
    paginationEl.style.display = 'none';
    return;
  }

  // ИСПРАВЛЕНО: нормализованные токены используются и для поиска, и для подсветки
  _currentTokens = GVS.normalizeQuery(raw);
  filtered = DATA.filter(d => _currentTokens.every(token => d._norm.includes(token)));

  currentPage = 1;
  statsBar.style.display = 'flex';
  foundCount.textContent = filtered.length;
  renderPage();
}

// ─── События ─────────────────────────────────────────────────────────────
let _searchDebounce;
searchInput.addEventListener('input', () => {
  if (searchInput.value) hintsDropdown.classList.remove('open');
  else hintsDropdown.classList.add('open');
  clearTimeout(_searchDebounce);
  _searchDebounce = setTimeout(applySearch, 250);
});

paginationEl.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-page]');
  if (btn && !btn.disabled) goPage(+btn.dataset.page);
});

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  applySearch();
  searchInput.focus();
});

// ─── Hints dropdown ──────────────────────────────────────────────────────
const hintsDropdown = document.getElementById('hintsDropdown');
function openHints()  { if (!searchInput.value) hintsDropdown.classList.add('open'); }
function closeHints() { setTimeout(() => hintsDropdown.classList.remove('open'), 150); }
searchInput.addEventListener('focus', openHints);
searchInput.addEventListener('blur',  closeHints);

document.querySelectorAll('.hint').forEach(btn => {
  btn.addEventListener('click', () => {
    const text = btn.querySelector('.hint-icon')
      ? btn.textContent.replace(btn.querySelector('.hint-icon').textContent, '').trim()
      : btn.textContent.trim();
    searchInput.value = text;
    hintsDropdown.classList.remove('open');
    applySearch();
    searchInput.focus();
  });
});

// ─── Загрузка data.json ───────────────────────────────────────────────────
// ИСПРАВЛЕНО: race condition — если пользователь ввёл запрос пока грузились
// данные, повторяем поиск после загрузки вместо перезаписи интерфейса.
resultsEl.innerHTML = `<div class="state-message">
  <span class="emoji">⏳</span>
  <h3>Загрузка данных…</h3>
  <p>Подождите секунду</p>
</div>`;

fetch('data.json')
  .then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(json => {
    // Строим нормализованный индекс (_norm) как строку объединённых токенов
    DATA = json.map(d => ({
      ...d,
      _norm: GVS.normalizeQuery(d.address).join(' '),
    }));
    dataLoaded = true;

    // ИСПРАВЛЕНО: если пользователь уже что-то ввёл — повторяем поиск,
    // иначе показываем приветственный экран
    if (searchInput.value.trim()) {
      applySearch();
    } else {
      resultsEl.innerHTML = `<div class="state-message">
        <span class="emoji">🏡</span>
        <h3>Найдите свой адрес</h3>
        <p>Введите улицу и номер дома — покажем даты отключения горячей воды</p>
      </div>`;
    }
  })
  .catch(err => {
    console.error(err);
    resultsEl.innerHTML = `<div class="state-message">
      <span class="emoji">❌</span>
      <h3>Не удалось загрузить данные</h3>
      <p>Попробуйте обновить страницу</p>
    </div>`;
  });
</script>
