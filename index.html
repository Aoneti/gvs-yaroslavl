<body>
<div class="container">
  <header>
    <div class="logo-icon">🔥</div>
    <h1>Отключение <span>горячей воды</span><br>в Ярославле 2026</h1>
    <div class="header-actions">
      <a href="map.html" class="map-btn">🗺️ Смотреть на карте (работает в тестовом режиме)</a>
    </div>
  </header>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Введите улицу и дом..." autocomplete="off" spellcheck="false"
           aria-label="Поиск по адресу" aria-controls="results" aria-autocomplete="list">
    <button class="clear-btn" id="clearBtn" title="Очистить" aria-label="Очистить поле поиска">✕</button>
    <div class="hints-dropdown" id="hintsDropdown">
      <button class="hint"><span class="hint-icon">🔍</span>Толбухина</button>
      <button class="hint"><span class="hint-icon">🔍</span>Некрасова</button>
      <button class="hint"><span class="hint-icon">🔍</span>Ленина</button>
      <button class="hint"><span class="hint-icon">🔍</span>Чайковского</button>
      <button class="hint"><span class="hint-icon">🔍</span>Свердлова</button>
      <button class="hint"><span class="hint-icon">🔍</span>Угличская</button>
    </div>
  </div>

  <div id="statsBar" class="stats" style="display:none" aria-live="polite">
    <div class="stat-chip">Найдено: <strong id="foundCount">0</strong></div>
  </div>

  <div id="results" aria-live="polite" aria-atomic="false"></div>
  <div class="pagination" id="pagination" style="display:none"></div>
</div>

<script>
// ─── Состояние ────────────────────────────────────────────────────────
let DATA        = [];
let filtered    = [];
let currentPage = 1;
const PER_PAGE  = 20;

// ─── DOM ──────────────────────────────────────────────────────────────
const searchInput  = document.getElementById('searchInput');
const clearBtn     = document.getElementById('clearBtn');
const resultsEl    = document.getElementById('results');
const statsBar     = document.getElementById('statsBar');
const foundCount   = document.getElementById('foundCount');
const paginationEl = document.getElementById('pagination');

// ─── Нормализация для поиска ──────────────────────────────────────────
// Убираем знаки препинания, "д.", "д", лишние пробелы — чтобы
// "Толбухина 6" находило "Толбухина, д.6" и "Толбухина д. 6"
function normalizeQuery(s) {
  return s.toLowerCase()
    .replace(/[,\.]/g, ' ')       // запятые и точки → пробел
    .replace(/\bд\b/g, ' ')       // отдельное "д" → пробел
    .replace(/\bул\b/g, ' ')      // "ул" → пробел
    .replace(/\bпр-кт\b/g, ' ')   // "пр-кт" → пробел
    .replace(/\bпр\b/g, ' ')      // "пр" → пробел
    .replace(/\s+/g, ' ')
    .trim();
}

// ─── Экранирование HTML ───────────────────────────────────────
function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ─── Подсветка совпадений ─────────────────────────────────────
function hl(text, q) {
  const safe = escapeHtml(text);
  if (!q) return safe;
  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return safe.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

// ─── Парсинг дат для статусных индикаторов ───────────────────
function parseOneDate(s) {
  const m = String(s).match(/(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if (!m) return null;
  return new Date(+m[3], +m[2] - 1, +m[1]);
}

// Разбирает строку с диапазоном и дату включения → {start, end}
// Форматы: "27.05.2025", "25.07-04.08.2025", "23-24.07.2025"
function parsePeriod(rangeStr, onStr) {
  if (!rangeStr) return null;
  const clean = String(rangeStr).replace(/\.{2,}/g, '.').trim();
  let start = null;

  // "dd.mm-dd.mm.yyyy"
  let m = clean.match(/^(\d{1,2})\.(\d{1,2})-\d{1,2}\.\d{1,2}\.(\d{4})/);
  if (m) start = new Date(+m[3], +m[2] - 1, +m[1]);

  // "dd-dd.mm.yyyy"
  if (!start) {
    m = clean.match(/^(\d{1,2})-\d{1,2}\.(\d{1,2})\.(\d{4})/);
    if (m) start = new Date(+m[3], +m[2] - 1, +m[1]);
  }

  // "dd.mm.yyyy"
  if (!start) start = parseOneDate(clean);
  if (!start) return null;

  const end = onStr ? parseOneDate(onStr) : null;
  return { start, end: end || start };
}

// Возвращает статус карточки относительно сегодняшней даты
function getStatus(d) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const soonLimit = new Date(today);
  soonLimit.setDate(today.getDate() + 7);

  const periods = [
    parsePeriod(d.repair,  d.repair_on),
    parsePeriod(d.hydro1,  d.hydro1_on),
    parsePeriod(d.hydro2,  d.hydro2_on),
  ].filter(Boolean);

  if (!periods.length) return 'normal';

  // Идёт прямо сейчас
  if (periods.some(p => today >= p.start && today <= p.end)) return 'active';

  // Начнётся в течение 7 дней
  if (periods.some(p => p.start > today && p.start <= soonLimit)) return 'soon';

  // Все периоды уже в прошлом
  if (periods.every(p => p.end < today)) return 'past';

  return 'normal';
}

// ─── Карточка адреса (без потребителя и без плашки района) ────────────
function renderCard(d, q) {
  const status = getStatus(d);
  const statusBadge =
    status === 'active' ? '<span class="status-badge active">● Нет воды</span>' :
    status === 'soon'   ? '<span class="status-badge soon">⚡ Скоро</span>'    :
    status === 'past'   ? '<span class="status-badge past">Завершено</span>'   : '';
  const cardClass = status === 'active' ? ' status-active' :
                    status === 'past'   ? ' status-past'   : '';

  const periods = [
    d.repair
      ? `<div class="period-item repair">
           <div class="period-label">Текущий ремонт</div>
           <div class="period-dates">${escapeHtml(d.repair)}</div>
           ${d.repair_on ? `<div class="period-on">✓ включение: ${escapeHtml(d.repair_on)}</div>` : ''}
         </div>` : '',
    d.hydro1
      ? `<div class="period-item hydro1">
           <div class="period-label">Гидроиспытания 1</div>
           <div class="period-dates">${escapeHtml(d.hydro1)}</div>
           ${d.hydro1_on ? `<div class="period-on">✓ включение: ${escapeHtml(d.hydro1_on)}</div>` : ''}
         </div>` : '',
    d.hydro2
      ? `<div class="period-item hydro2">
           <div class="period-label">Гидроиспытания 2</div>
           <div class="period-dates">${escapeHtml(d.hydro2)}</div>
           ${d.hydro2_on ? `<div class="period-on">✓ включение: ${escapeHtml(d.hydro2_on)}</div>` : ''}
         </div>` : '',
  ].filter(Boolean).join('') || '<div class="period-empty">Нет данных о периодах</div>';

  return `
    <div class="result-card${cardClass}">
      <div class="card-header">
        <div class="address-badge">${hl(d.address, q)}</div>
        ${statusBadge}
      </div>
      <div class="periods-grid">${periods}</div>
      ${d.source ? `<div class="card-footer"><span class="source-tag">🏘️ ${escapeHtml(d.source)}</span></div>` : ''}
    </div>`;
}

// ─── Рендер страницы результатов ──────────────────────────────────────
function renderPage() {
  const q     = searchInput.value.trim();
  const start = (currentPage - 1) * PER_PAGE;
  const page  = filtered.slice(start, start + PER_PAGE);

  resultsEl.innerHTML = page.length
    ? page.map(d => renderCard(d, q)).join('')
    : `<div class="state-message">
         <span class="emoji">🤔</span>
         <h3>Ничего не найдено</h3>
         <p>Попробуйте другое написание адреса</p>
       </div>`;

  renderPagination();
}

// ─── Пагинация ────────────────────────────────────────────────────────
function renderPagination() {
  const total = Math.ceil(filtered.length / PER_PAGE);

  if (total <= 1) {
    paginationEl.style.display = 'none';
    return;
  }

  paginationEl.style.display = 'flex';

  let pages = [];
  if (total <= 7) {
    pages = Array.from({length: total}, (_, i) => i + 1);
  } else {
    pages = [1];
    if (currentPage > 3) pages.push('…');
    for (let p = Math.max(2, currentPage - 1); p <= Math.min(total - 1, currentPage + 1); p++) pages.push(p);
    if (currentPage < total - 2) pages.push('…');
    pages.push(total);
  }

  let html = `<button class="page-btn" data-page="${currentPage - 1}" ${currentPage === 1 ? 'disabled' : ''}>← Назад</button>`;
  pages.forEach(p => {
    html += p === '…'
      ? `<span class="page-info">…</span>`
      : `<button class="page-btn ${p === currentPage ? 'active' : ''}" data-page="${p}">${p}</button>`;
  });
  html += `<button class="page-btn" data-page="${currentPage + 1}" ${currentPage === total ? 'disabled' : ''}>Вперёд →</button>`;
  html += `<span class="page-info">${currentPage} / ${total}</span>`;

  paginationEl.innerHTML = html;
}

function goPage(n) {
  const total = Math.ceil(filtered.length / PER_PAGE);
  currentPage = Math.max(1, Math.min(n, total));
  renderPage();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// ─── Поиск ────────────────────────────────────────────────────────────
function applySearch() {
  const raw = searchInput.value.trim();
  clearBtn.classList.toggle('visible', raw.length > 0);

  if (!raw) {
    filtered = [];
    resultsEl.innerHTML = `<div class="state-message">
      <span class="emoji">🏡</span>
      <h3>Найдите свой адрес</h3>
      <p>Введите улицу и номер дома — покажем даты отключения горячей воды</p>
    </div>`;
    statsBar.style.display = 'none';
    paginationEl.style.display = 'none';
    return;
  }

  // Нормализуем запрос и ищем по нормализованному адресу
  const q = normalizeQuery(raw);
  const tokens = q.split(' ').filter(Boolean);   // все слова запроса

  filtered = DATA.filter(d =>
    tokens.every(token => d._norm.includes(token))
  );

  currentPage = 1;
  statsBar.style.display = 'flex';
  foundCount.textContent = filtered.length;
  renderPage();
}

// ─── События ──────────────────────────────────────────────────────────
let _searchDebounce;
searchInput.addEventListener('input', () => {
  // скрываем подсказки как только пользователь начал печатать
  if (searchInput.value) hintsDropdown.classList.remove('open');
  else hintsDropdown.classList.add('open');
  clearTimeout(_searchDebounce);
  _searchDebounce = setTimeout(applySearch, 250);
});

// Делегирование событий пагинации (вместо inline onclick)
paginationEl.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-page]');
  if (btn && !btn.disabled) goPage(+btn.dataset.page);
});

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  applySearch();
  searchInput.focus();
});

// ─── Hints dropdown ───────────────────────────────────────────
const hintsDropdown = document.getElementById('hintsDropdown');

function openHints() {
  if (!searchInput.value) hintsDropdown.classList.add('open');
}
function closeHints() {
  // небольшая задержка, чтобы клик по hint успел сработать
  setTimeout(() => hintsDropdown.classList.remove('open'), 150);
}

searchInput.addEventListener('focus', openHints);
searchInput.addEventListener('blur',  closeHints);

document.querySelectorAll('.hint').forEach(btn => {
  btn.addEventListener('click', () => {
    // берём только текст, без иконки
    const text = btn.querySelector('.hint-icon')
      ? btn.textContent.replace(btn.querySelector('.hint-icon').textContent, '').trim()
      : btn.textContent.trim();
    searchInput.value = text;
    hintsDropdown.classList.remove('open');
    applySearch();
    searchInput.focus();
  });
});

// ─── Загрузка data.json ───────────────────────────────────────────────
resultsEl.innerHTML = `<div class="state-message">
  <span class="emoji">⏳</span>
  <h3>Загрузка данных…</h3>
  <p>Подождите секунду</p>
</div>`;

fetch('data.json')
  .then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(json => {
    DATA = json.map(d => ({ ...d, _norm: normalizeQuery(d.address) }));
    resultsEl.innerHTML = `<div class="state-message">
      <span class="emoji">🏡</span>
      <h3>Найдите свой адрес</h3>
      <p>Введите улицу и номер дома — покажем даты отключения горячей воды</p>
    </div>`;
  })
  .catch(err => {
    console.error(err);
    resultsEl.innerHTML = `<div class="state-message">
      <span class="emoji">❌</span>
      <h3>Не удалось загрузить данные</h3>
    </div>`;
  });
</script>
